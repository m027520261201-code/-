<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여행 블로그</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* 전체 배경색 */
    body {
      background-color: #0990f1;
      font-family: 'Malgun Gothic', sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden; /* 사이드바 때문에 가로 스크롤 생기는 것 방지 */
    }

    /* 블로그 제목 글자 색상 */
    header h1 {
      color: #0c81f7;
      margin-left: 20px;
    }

    /* 사이드바 스타일 및 숨김 처리 */
    .sidebar {
      position: fixed;
      right: 0;
      top: 0;
      width: 200px;
      height: 100%;
      background: rgb(237, 37, 37);
      box-shadow: -2px 0 5px rgba(0,0,0,0.1);
      padding: 40px 20px 20px 20px;
      transition: transform 0.4s ease-in-out; /* 부드러운 애니메이션 */
      z-index: 1000;
      transform: translateX(100%); /* 기본적으로 오른쪽 밖으로 숨김 */
    }

    /* 사이드바가 활성화되었을 때 (마우스가 가까이 갔을 때) */
    .sidebar.active {
      transform: translateX(0);
    }

    /* 슬라이드 이미지 기본 스타일 */
    .slideshow img {
      width: 100%;
      display: none;
    }
    .slideshow img.active {
      display: block;
    }

    /* 테이블 스타일 보정 */
    table {
      margin: 20px;
      width: calc(100% - 40px);
      text-align: center;
      background: rgb(203, 140, 140);
      border-collapse: collapse;
    }
    th, td { padding: 10px; border: 1px solid #ccc; }
  </style>
</head>
<body>

  <header>
    <h1>집에는 언제가?</h1>
    <nav>
      <ul>
        <li><a href="Chatbot.html">챗봇물어보기</a></li>
        <li><a href="#">여행지</a></li>
        <li><a href="#">소개</a></li>
        <li><a href="memo.html">방명록</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="featured-post">
      <div class="post-info" style="padding: 20px;">
        <h2>집가고 싶은데 언제 집에 가지?</h2>
        <p>집에 빨리 갈 수록 더욱 행복해집니다.</p>
      </div>
    </section>

    <div class="slideWrap">
        <div class="slideshow">
          <img src="./myImg/img1.jpg" alt="Slide 1" class="active">
          <img src="./myImg/img2.jpg" alt="Slide 2">
        </div>
    </div>

    <table>
        <thead>
          <tr>
            <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th><th>일</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td onclick="showAlert('여행일정짜기')">여행일정짜기</td>
            <td onclick="showAlert('필요물품구매')">필요물품구매</td>
            <td onclick="showAlert('장보기')">장보기</td>
            <td onclick="showAlert('보험가입')">보험가입</td>
            <td onclick="showAlert('체크리스트')">체크리스트 확인</td>
            <td onclick="showAlert('신나는')">신나 여행</td>
            <td onclick="showAlert('복귀')">복귀</td>
          </tr>
        </tbody>
    </table>

    <div class="post-form" style="padding: 20px;">
        <h2>게시글 작성</h2>
        <input type="text" id="post-title" placeholder="제목" style="width: 100%; margin-bottom: 10px; padding: 5px;">
        <textarea id="post-content" placeholder="내용" style="width: 100%; height: 100px; margin-bottom: 10px; padding: 5px;"></textarea>
        <button id="submit-btn" style="padding: 10px 20px;">게시하기</button>
    </div>
  
    <div id="post-container" style="padding: 20px;"></div>
  </main>

  <aside class="sidebar" id="sidebar">
    <h2>Online Users</h2>
    <hr>
    <ul id="online-users"></ul>
  </aside>

  <footer style="padding: 20px; text-align: center;">
    <p>&copy; 2023 여행 블로그. All rights reserved.</p>
  </footer>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="scripts.js"></script>
</body>
</html>
